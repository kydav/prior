name: prior
description: "Water rights lookup for western US real estate"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.9
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.8.1
  http: ^1.4.0
  mapbox_maps_flutter: ^2.5.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#020d18"
  image: assets/images/splash_logo.png
  color_dark: "#020d18"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#020d18"
    image: assets/images/splash_logo.png
    color_dark: "#020d18"
    image_dark: assets/images/splash_logo.png
  web: false
